# RL training configuration — Phase 2
training:
  total_timesteps: 500_000
  checkpoint_dir: checkpoints/limbic_v1
  checkpoint_freq: 100_000   # save every N steps
  log_dir: logs/ppo

# SB3 PPO hyperparameters
ppo:
  policy: MlpPolicy
  device: cpu   # MlpPolicy is faster on CPU than GPU
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 0.0003
  clip_range: 0.2
  ent_coef: 0.01
  policy_kwargs:
    net_arch: [64, 64]   # 2×64 MLP as specified in the plan

# Logging
wandb:
  enabled: false         # always false in tests; enable manually for training runs
  project: murimsim
  entity: null

# Phase 3c: combat training with curriculum (ATTACK/DEFEND, fight/flight)
phase3c:
  total_timesteps: 500_000
  checkpoint_dir: checkpoints/limbic_v2
  checkpoint_freq: 100_000
  n_envs: 4
  curriculum_ramp_steps: 300_000

# Phase 3b: multi-agent coexistence (N agents sharing one World, round-robin policy)
phase3b:
  total_timesteps: 200_000
  checkpoint_dir: checkpoints/limbic_v1c
  checkpoint_freq: 50_000
  n_envs: 4

# Phase 3a: multi-environment training (3 env types × 8 parallel envs, shared policy)
phase3a:
  total_timesteps: 300_000
  checkpoint_dir: checkpoints/limbic_v1b
  checkpoint_freq: 100_000

# Domain randomisation — applied per episode in SurvivalEnv.reset().
# Each episode samples world params uniformly from these ranges so the policy
# learns to survive across a spectrum of environments, not just one fixed config.
domain_randomization:
  enabled: true
  food_regen_ticks: [50, 250]      # world ticks range
  food_spawn_density: [0.03, 0.08] # spawn density range
  action_ticks: [3, 8]             # world ticks per agent action range

# LSTM / Recurrent PPO — Stage 4 training
# Replaces MlpPolicy with MlpLstmPolicy. All other env settings identical to phase3c.
lstm:
  total_timesteps: 2_000_000
  checkpoint_dir: checkpoints/limbic_lstm_v2
  checkpoint_freq: 100_000
  n_envs: 4
  curriculum_ramp_steps: 300_000
  lstm_hidden_size: 64        # size of the hidden state vector (the "notepad")
  n_lstm_layers: 1            # 1 is sufficient; 2 gives more capacity at higher cost
  shared_lstm: false          # if true, actor and critic share the LSTM
  n_steps: 512                # shorter rollout chunks suit recurrent training
  batch_size: 64              # must divide n_steps * n_envs evenly

# v12 fine-tuning config — warm-started from v11, focused on policy stability.
# Key changes vs v11:
#   - Linear LR decay: 3e-4 → 3e-5 (10x reduction by end)
#   - Linear clip_range decay: 0.2 → 0.1 (prevents late-stage policy oscillation)
#   - ent_coef raised to 0.02 (maintains exploration, reduces premature collapse)
#   - curriculum_ramp_steps = 1 (combat fully on from step 1 — already trained)
#   - Shorter run: 1M steps (fine-tuning, not full retraining)
lstm_v12:
  total_timesteps: 1_000_000
  checkpoint_freq: 100_000
  n_envs: 4
  curriculum_ramp_steps: 1        # combat already learned; ramp immediately to max
  lstm_hidden_size: 64
  n_lstm_layers: 1
  shared_lstm: false
  n_steps: 512
  batch_size: 64
  learning_rate: 0.0001           # lower start (warm-start is already well-trained)
  learning_rate_final: 0.00001    # 10x decay by end
  clip_range: 0.15                # tighter than default 0.2
  clip_range_final: 0.05          # very tight at end — lock in good policy
  ent_coef: 0.02                  # higher entropy → more exploration, less collapse

# lstm_v13: reward fix — gated health recovery, stronger gather reward
#   - Same LR/clip decay as v12 (stable fine-tuning)
#   - Warm-starts from v12 final
#   - Fixes eat-farming: REWARD_HEALTH_RECOVERY only fires when health < 0.70
#   - REWARD_FOOD_GATHERED_SCALE raised 0.10 → 0.15 (gather > eat incentive)
lstm_v13:
  total_timesteps: 1_500_000
  checkpoint_freq: 100_000
  n_envs: 4
  curriculum_ramp_steps: 1
  lstm_hidden_size: 64
  n_lstm_layers: 1
  shared_lstm: false
  n_steps: 512
  batch_size: 64
  learning_rate: 0.0001
  learning_rate_final: 0.00001
  clip_range: 0.15
  clip_range_final: 0.05
  ent_coef: 0.02
